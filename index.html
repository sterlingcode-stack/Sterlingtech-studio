<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Fix AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <h1>Bug Fix AI</h1>
        <p>Your smart AI for detecting and fixing code bugs</p>
    </header>

    <!-- MAIN SECTION -->
    <main>
        <section class="hero">
            <h2>Fix Your Code Instantly</h2>
            <p>Paste your code and let AI detect and fix errors automatically.</p>

            <textarea id="codeInput" placeholder="Paste your buggy code here..."></textarea>

            <button onclick="fixCode()">Fix Code</button>

            <h3>Fixed Output:</h3>
            <pre id="output"></pre>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Bug Fix AI. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
  </html>
